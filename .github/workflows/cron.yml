name: Hourly Image Webhook

on:
  schedule:
    # 매시 1분마다 실행 (UTC 기준)
    - cron: '1 * * * *'
  workflow_dispatch: # 수동으로도 실행 가능하게 설정

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        env:
        # GitHub Secrets를 파이썬 환경 변수로 매핑
          WEBHOOK_URL_1: ${{ secrets.WEBHOOK_URL_1 }}
          WEBHOOK_URL_2: ${{ secrets.WEBHOOK_URL_2 }}
        run: python main.py # 실제 파이썬 파일 이름으로 변경하세요